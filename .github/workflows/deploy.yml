name: Deploy to Linux Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:      # 支持在 GitHub 页面手动触发

env:
  DEPLOY_DIR: /opt/i8-workflow-monitor
  SERVICE_NAME: i8-workflow-monitor

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject production config
        run: |
          if [ -n "${{ secrets.CONFIG_INI }}" ]; then
            echo "${{ secrets.CONFIG_INI }}" | base64 -d > config.ini
            echo "✅ 生产 config.ini 已生成"
          else
            echo "⚠️ 未设置 CONFIG_INI secret，将使用 config.ini.example"
            cp config.ini.example config.ini
          fi

      - name: Sync files to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT || '22' }}
          key: ${{ secrets.SSH_KEY }}
          source: .
          target: ${{ env.DEPLOY_DIR }}
          rm: false
          overwrite: true

      - name: Deploy on remote server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT || '22' }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "📦 开始部署..."

            cd ${{ env.DEPLOY_DIR }}

            # 1. 清理不应覆盖的本地文件
            rm -rf venv .monitor_state.json *.log __pycache__

            # 2. 修复权限
            chmod +x i8_workflow_monitor.py
            chmod 600 config.ini

            # 3. 创建/更新虚拟环境
            python3 -m venv venv
            ./venv/bin/pip install -r requirements.txt -q
            echo "✅ 依赖已安装"

            # 4. 注册 systemd 服务（首次自动创建）
            SERVICE_FILE="/etc/systemd/system/${SERVICE_NAME}.service"
            sudo tee "$SERVICE_FILE" > /dev/null <<SERVICEEOF
[Unit]
Description=i8 Workflow Task Monitor
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
User=root
WorkingDirectory=${{ env.DEPLOY_DIR }}
ExecStart=${{ env.DEPLOY_DIR }}/venv/bin/python ${{ env.DEPLOY_DIR }}/i8_workflow_monitor.py
Restart=always
RestartSec=10
StandardOutput=append:${{ env.DEPLOY_DIR }}/monitor.log
StandardError=append:${{ env.DEPLOY_DIR }}/monitor.log

[Install]
WantedBy=multi-user.target
SERVICEEOF
            sudo systemctl daemon-reload
            sudo systemctl enable ${SERVICE_NAME}.service
            sudo systemctl restart ${SERVICE_NAME}.service
            echo "✅ 服务已重启"

            # 5. 验证运行状态
            sleep 3
            sudo systemctl status ${SERVICE_NAME}.service --no-pager | head -12
            echo ""
            echo "🎉 部署完成！"
            echo "日志查看: tail -f ${{ env.DEPLOY_DIR }}/monitor.log"
            echo "系统日志: sudo journalctl -u ${SERVICE_NAME} -f"
