name: Scheduled Task Check

on:
  schedule:
    # 每隔 30 分钟运行一次检测
    - cron: '*/30 * * * *'
  workflow_dispatch:      # 支持在 GitHub 页面手动触发

jobs:
  check-tasks:
    name: Check Pending Tasks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -q
          echo "✅ 依赖已安装"

      - name: Inject config.ini
        run: |
          if [ -n "${{ secrets.CONFIG_INI }}" ]; then
            echo "${{ secrets.CONFIG_INI }}" | base64 -d > config.ini
            chmod 600 config.ini
            echo "✅ 生产 config.ini 已加载"
          else
            echo "⚠️ 未设置 CONFIG_INI Secret，使用示例配置"
            cp config.ini.example config.ini
          fi

      - name: Run i8 task check
        run: |
          echo "============================================"
          echo "🕐 定时待办检测 ($(date '+%Y-%m-%d %H:%M:%S'))"
          echo "运行环境: GitHub Actions (${{ runner.os }})"
          echo "============================================"

          python i8_workflow_monitor.py --once 2>&1

          echo ""
          echo "============================================"
          echo "✅ 检测完成"
          echo "============================================"

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-log
          path: monitor.log
          retention-days: 7
